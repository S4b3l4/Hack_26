<!DOCTYPE html>
<html>
<head>
    <title>Invocador de Documentos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>Invocador de documentosOS</h1>
    
    <div class="contenedor-principal">

        <form action="/upload" method="POST" enctype="multipart/form-data">
            <input type="file" name="archivo" multiple accept=".pdf, .txt, .docx">
            <button type="submit">Subir archivo</button>
        </form>
        
        <form action="/buscar" method="GET">
            <input type="text" name="titulo" placeholder="Buscar por título">
            <input type="text" name="autor" placeholder="Buscar por autor">
            <input type="text" name="fecha" placeholder="Buscar por fecha (YYYY-MM-DD)">
            <button type="submit">Buscar</button>
        </form>
        
    </div>
</body>
</html>
